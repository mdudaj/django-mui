<ul>
  {% for item in navigation_items %}
    <li>
      <a href="{{ item.url }}"{% if item.active %} aria-current="page"{% endif %}>{{ item.label }}</a>
      {% if item.children %}
        <ul>
          {% for child in item.children %}
            <li>
              <a href="{{ child.url }}"{% if child.active %} aria-current="page"{% endif %}>{{ child.label }}</a>
            </li>
          {% endfor %}
        </ul>
      {% endif %}
    </li>
  {% endfor %}
</ul>
