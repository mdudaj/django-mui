name: QA

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tooling
        run: python -m pip install --upgrade pip "ruff==0.15.4"
      - name: Lint
        run: ruff check .
      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
